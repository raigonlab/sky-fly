<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky-Fly</title>

    <!-- Bootstrap  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Aewsome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <header>
      <!--Bootstrap Nav -->
      <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">sky-fly</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="fly-experience.html"
                  >Fly Experience</a
                >
              </li>

              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="gallery.html"
                  >Gallery</a
                >
              </li>

              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="contact.html"
                  >Contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- HERO SECTION -->
    <main>
      <!--<section class="hero">
        <div class="hero-content"></div>
        </section> -->

      <!-- Contact formular -->
      <section class="contact-section">
        <div class="contact-container">
          <h2>Contact Us</h2>
          <p>Have questions or ready to book your flight? Send us a message.</p>

          <form class="contact-form">
            <!-- Name -->
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>

            <!-- Email -->
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <!-- Date -->
            <div class="form-group">
              <label for="date">Preferred Date</label>
              <input type="date" id="date" name="date" required />
            </div>

            <!-- Number of people -->
            <div class="form-group">
              <label for="people">Number of People</label>
              <input
                type="number"
                id="people"
                name="people"
                min="1"
                max="10"
                required
              />
            </div>

            <!-- Message -->
            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required
              ></textarea>
            </div>

            <!-- Button -->
            <button type="submit" class="submit-btn">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <p class="footer-text">© 2024 Sky-Fly. All rights reserved.</p>

        <div class="footer-socials">
          <!--Youtube icon and link -->
          <a href="https://youtube.com" target="_blank">
            <i class="fab fa-youtube"></i
          ></a>
          <!-- Instagram icon and link -->
          <a href="https://instagram.com" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
        </div>
      </div>
    </footer>
    <!-- Bootstrap script link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
