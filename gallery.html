<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Sky-Fly | Gallery</title>

  <body>
    <!-- NAVBAR -->
    <header>
      <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">sky-fly</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"

              <li class="nav-item">

            <img src="assets/images/gallery/sky-fly-clouds-aerial-04.png" alt="Friends celebrating at sunset in flight gear">
            <img src="assets/images/gallery/sky-fly-clouds-aerial-05.png" alt="A pilot preparing equipment">
            <img src="assets/images/gallery/sky-fly-clouds-aerial-06.png" alt="A flight over mountains and sunset views">
            <img src="assets/images/gallery/sky-fly-clouds-aerial-07.png" alt="A woman celebrating with a drink">

            <img src="assets/images/gallery/sky-fly-alps-sunrise-15.png" alt="A woman celebrating with a drink">
